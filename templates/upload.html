<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Upload Simulator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">Drone Upload Sim</div>
        <div class="user-info">
            <a href="/dashboard" style="color: var(--accent);">Back to Dashboard</a>
        </div>
    </header>

    <div class="container">
        <div class="upload-layout">
            <div class="form-container">
                <h2>Upload Intelligence</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Simulate drone transmission. Location will be extracted automatically from image metadata.</p>
                
                <form id="upload-form">
                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label>Intelligence Image</label>
                        <input type="file" name="file" accept="image/png, image/jpeg" required>
                    </div>
                    
                    <button type="submit" style="margin-top: 1rem;">Process Image & Dispatch</button>
                    <div id="result-message" style="margin-top: 1rem; font-weight: 600;"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/upload.js"></script>
</body>
</html>
